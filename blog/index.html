<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ひなーち（hina-chi）のブログ。配信のこと、日常のことなど。#ひなちぇっく">
  <title>Blog | ひなーち</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="blog.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <header class="header">
    <div class="container header-inner">
      <a href="../index.html" class="logo">hina-chi</a>
      <nav class="nav">
        <a href="../index.html#about">About</a>
        <a href="../index.html#schedule">Schedule</a>
        <a href="../index.html#news">News</a>
        <a href="../index.html#events">Events</a>
        <a href="../index.html#works">Works</a>
        <a href="." aria-current="page">Blog</a>
        <a href="../index.html#links">Links</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="blog-hero">
      <div class="container">
        <p class="blog-hero-label">Blog</p>
        <h1 class="blog-hero-title">ひなーちのブログ</h1>
        <p class="blog-hero-desc">配信のこと、日常のこと、つれづれなるままに。</p>
      </div>
    </div>

    <section class="blog-section">
      <div class="container">
        <div id="tag-filter" class="tag-filter"></div>
        <ul id="post-list" class="post-list">
          <li class="blog-empty">記事を読み込み中…</li>
        </ul>
        <p id="no-results" class="blog-empty" hidden>このタグの記事はまだありません。</p>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 ひなーち · <span class="footer-hashtag">#ひなちぇっく</span></p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="posts.js"></script>
  <script>
    (function () {
      var list       = document.getElementById("post-list");
      var filterWrap = document.getElementById("tag-filter");
      var noResults  = document.getElementById("no-results");
      if (!list) return;

      var items = (typeof POSTS !== "undefined" ? POSTS : []).filter(function (p) { return p && p.title; });

      if (items.length === 0) {
        list.innerHTML = "<li class=\"blog-empty\">まだ記事がありません。</li>";
        return;
      }

      // 全タグ収集（重複除去・出現順）
      var allTags = [];
      items.forEach(function (p) {
        (p.tags || []).forEach(function (t) {
          if (allTags.indexOf(t) === -1) allTags.push(t);
        });
      });

      // タグフィルターボタン生成
      if (allTags.length > 0) {
        var btns = ["すべて"].concat(allTags).map(function (tag) {
          var btn = document.createElement("button");
          btn.className = "tag-btn";
          btn.textContent = tag;
          btn.setAttribute("aria-pressed", tag === "すべて" ? "true" : "false");
          btn.addEventListener("click", function () {
            document.querySelectorAll(".tag-btn").forEach(function (b) {
              b.setAttribute("aria-pressed", "false");
            });
            btn.setAttribute("aria-pressed", "true");
            filterPosts(tag === "すべて" ? null : tag);
          });
          return btn;
        });
        btns.forEach(function (b) { filterWrap.appendChild(b); });
      }

      // 記事リスト生成
      list.innerHTML = items.map(function (p) {
        var tagsHtml = (p.tags && p.tags.length)
          ? "<div class=\"post-tags\">" + p.tags.map(function (t) {
              return "<span class=\"post-tag\">" + t + "</span>";
            }).join("") + "</div>"
          : "";

        var dataTag  = (p.tags || []).join(",");
        var dataFile = p.file || "";

        return [
          "<li class=\"post-item\" data-tags=\"" + dataTag + "\" data-file=\"" + dataFile + "\">",
          "  <details>",
          "    <summary class=\"post-toggle\">",
          "      <span class=\"post-date\">" + (p.date || "") + "</span>",
          "      <span class=\"post-title\">" + p.title + "</span>",
          "      <span class=\"post-arrow\">▶</span>",
          "    </summary>",
          "    <div class=\"post-body\">" + tagsHtml + "<div class=\"post-md\"><p class=\"post-loading\">読み込み中…</p></div></div>",
          "  </details>",
          "</li>"
        ].join("\n");
      }).join("\n");

      // 最初の記事をデフォルトで開く
      var firstDetails = list.querySelector("details");
      if (firstDetails) {
        firstDetails.open = true;
        firstDetails.dispatchEvent(new Event("toggle", { bubbles: true }));
      }

      // details を開いたときに .md を fetch してレンダリング
      list.addEventListener("toggle", function (e) {
        var details = e.target;
        if (details.tagName !== "DETAILS" || !details.open) return;
        var li   = details.closest(".post-item");
        var mdEl = details.querySelector(".post-md");
        if (!li || !mdEl || mdEl.dataset.loaded) return;

        var file = li.getAttribute("data-file");
        if (!file) {
          mdEl.innerHTML = "<p>（本文なし）</p>";
          mdEl.dataset.loaded = "1";
          return;
        }

        fetch(file)
          .then(function (res) {
            if (!res.ok) throw new Error(res.status);
            return res.text();
          })
          .then(function (md) {
            mdEl.innerHTML = marked.parse(md);
            mdEl.dataset.loaded = "1";
          })
          .catch(function () {
            mdEl.innerHTML = "<p class=\"post-loading\">記事の読み込みに失敗しました。</p>";
          });
      }, true);

      // フィルター処理
      function filterPosts(tag) {
        var postItems = list.querySelectorAll(".post-item");
        var visible = 0;
        postItems.forEach(function (el) {
          if (!tag) {
            el.hidden = false;
            visible++;
          } else {
            var tags = el.getAttribute("data-tags").split(",");
            var match = tags.indexOf(tag) !== -1;
            el.hidden = !match;
            if (match) visible++;
          }
        });
        noResults.hidden = visible > 0;
      }
    })();
  </script>
</body>
</html>
