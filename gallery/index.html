<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ひなーち（hina-chi）のギャラリー。ファンアート・配信スクショなど。#ひなちぇっく">
  <title>Gallery | ひなーち</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="gallery.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <header class="header">
    <div class="container header-inner">
      <a href="../index.html" class="logo">hina-chi</a>
      <nav class="nav">
        <a href="../index.html#about">About</a>
        <a href="." aria-current="page">Gallery</a>
        <a href="../index.html#schedule">Schedule</a>
        <a href="../index.html#news">News</a>
        <a href="../index.html#events">Events</a>
        <a href="../index.html#works">Works</a>
        <a href="../blog/">Blog</a>
        <a href="../index.html#links">Links</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="gallery-hero">
      <div class="container">
        <p class="gallery-hero-label">Gallery</p>
        <h1 class="gallery-hero-title">ギャラリー</h1>
        <p class="gallery-hero-desc">ファンアートや配信のスクショなど、すべての作品を載せています。</p>
      </div>
    </div>

    <section class="gallery-page-section">
      <div class="container">
        <div id="gallery-filter" class="gallery-filter" role="group" aria-label="ギャラリーの分類">
          <button type="button" class="gallery-filter-btn" data-filter="all" aria-pressed="true">すべて</button>
          <button type="button" class="gallery-filter-btn" data-filter="fanart" aria-pressed="false">Fan Art</button>
          <button type="button" class="gallery-filter-btn" data-filter="screenshot" aria-pressed="false">Screenshot</button>
        </div>
        <div id="gallery-grid" class="gallery-grid gallery-page-grid" data-gallery-mode="all" data-gallery-base="../">
          <p class="gallery-empty">画像は準備中です。</p>
        </div>
        <p class="gallery-note">
          ファンアートの掲載希望は
          <a href="https://x.com/Hina_nachi" target="_blank" rel="noopener">X（@Hina_nachi）</a>
          のDMなどでお知らせください。
        </p>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 ひなーち · <span class="footer-hashtag">#ひなちぇっく</span></p>
    </div>
  </footer>

  <script src="../data/gallery.js"></script>
  <script src="../js/gallery.js"></script>
</body>
</html>
